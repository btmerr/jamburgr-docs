<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="favicon-title favicon-desc">
  <title id="favicon-title">jamburgr favicon</title>
  <desc id="favicon-desc">Simplified Jammy mascot tuned for browser tab favicon sizes.</desc>

  <!-- Background tile -->
  <rect width="96" height="96" rx="16" fill="#fbf6e4"/>

  <!-- Bottom bun -->
  <path d="M 14 70
           C 14 67 16 65 19 65
           L 77 65
           C 80 65 82 67 82 70
           L 82 76
           C 82 82 77 86 71 86
           L 25 86
           C 19 86 14 82 14 76 Z"
        fill="#d8a866" stroke="#1a1410" stroke-width="3" stroke-linejoin="round"/>

  <!-- Jam slab -->
  <rect x="15" y="50" width="66" height="16" rx="2" fill="#e6394d" stroke="#1a1410" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 19 54 L 77 54" stroke="#ff8a9a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Jam drip -->
  <path d="M 38 65 Q 38 75 42 78 Q 46 75 46 65 Z"
        fill="#e6394d" stroke="#1a1410" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Top bun -->
  <path d="M 14 51
           L 14 32
           Q 14 10 48 10
           Q 82 10 82 32
           L 82 51 Z"
        fill="#d8a866" stroke="#1a1410" stroke-width="3" stroke-linejoin="round"/>

  <!-- Sesame seeds -->
  <ellipse cx="33" cy="22" rx="3" ry="1.8" fill="#fbf6e4" stroke="#1a1410" stroke-width="1.2" transform="rotate(-14 33 22)"/>
  <ellipse cx="48" cy="16" rx="3" ry="1.8" fill="#fbf6e4" stroke="#1a1410" stroke-width="1.2"/>
  <ellipse cx="63" cy="22" rx="3" ry="1.8" fill="#fbf6e4" stroke="#1a1410" stroke-width="1.2" transform="rotate(14 63 22)"/>

  <!-- Eyes (chunky for small-size legibility) -->
  <circle cx="36" cy="38" r="5" fill="#fbf6e4" stroke="#1a1410" stroke-width="2"/>
  <circle cx="60" cy="38" r="5" fill="#fbf6e4" stroke="#1a1410" stroke-width="2"/>
  <circle cx="37" cy="39" r="2.5" fill="#1a1410"/>
  <circle cx="61" cy="39" r="2.5" fill="#1a1410"/>
</svg>
