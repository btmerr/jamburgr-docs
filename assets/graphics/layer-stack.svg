<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc">
  <title id="title">jamburgr layer stack</title>
  <desc id="desc">A stacked diagram of the chord, bass, pad, and lead MIDI layers generated by jamburgr packs.</desc>
  <rect width="720" height="300" fill="#fffdf7"/>
  <text x="40" y="36" fill="#77736a" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">LAYER STACK</text>
  <g font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">
    <g transform="translate(70 62)">
      <rect width="580" height="42" fill="#f4f1ea" stroke="#141412" stroke-width="2"/>
      <text x="22" y="27" fill="#141412" font-size="17" font-weight="600">lead</text>
      <text x="436" y="27" fill="#77736a" font-size="12">motifs / arps / top lines</text>
    </g>
    <g transform="translate(70 112)">
      <rect width="580" height="42" fill="#f4f1ea" stroke="#141412" stroke-width="2"/>
      <text x="22" y="27" fill="#141412" font-size="17" font-weight="600">pad</text>
      <text x="436" y="27" fill="#77736a" font-size="12">wide sustain / shimmer</text>
    </g>
    <g transform="translate(70 162)">
      <rect width="580" height="42" fill="#f4f1ea" stroke="#141412" stroke-width="2"/>
      <text x="22" y="27" fill="#141412" font-size="17" font-weight="600">chords</text>
      <text x="436" y="27" fill="#77736a" font-size="12">voicing / pattern</text>
    </g>
    <g transform="translate(70 212)">
      <rect width="580" height="42" fill="#141412"/>
      <text x="22" y="27" fill="#f4f1ea" font-size="17" font-weight="600">bass</text>
      <text x="436" y="27" fill="#d5cfc2" font-size="12">root / fifth / octave / 808</text>
    </g>
  </g>
  <path d="M46 62v192" stroke="#9f3f2d" stroke-width="3"/>
</svg>
