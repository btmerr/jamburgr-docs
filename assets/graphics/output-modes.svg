<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc">
  <title id="title">jamburgr output modes</title>
  <desc id="desc">A diagram comparing single, multi, both, and pack output modes as MIDI files and Markdown notes.</desc>
  <rect width="720" height="300" fill="#fffdf7"/>
  <text x="40" y="36" fill="#77736a" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">OUTPUT MODES</text>
  <g font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">
    <g transform="translate(40 72)">
      <rect width="132" height="150" fill="#f4f1ea" stroke="#141412" stroke-width="2"/>
      <text x="18" y="34" fill="#141412" font-size="20" font-weight="600">single</text>
      <rect x="18" y="70" width="96" height="22" fill="#141412"/>
      <text x="27" y="86" fill="#f4f1ea" font-size="11">one .mid</text>
    </g>
    <g transform="translate(206 72)">
      <rect width="132" height="150" fill="#f4f1ea" stroke="#141412" stroke-width="2"/>
      <text x="18" y="34" fill="#141412" font-size="20" font-weight="600">multi</text>
      <rect x="18" y="60" width="96" height="16" fill="#141412"/>
      <rect x="18" y="84" width="96" height="16" fill="#30302d"/>
      <rect x="18" y="108" width="96" height="16" fill="#9f3f2d"/>
    </g>
    <g transform="translate(372 72)">
      <rect width="132" height="150" fill="#f4f1ea" stroke="#141412" stroke-width="2"/>
      <text x="18" y="34" fill="#141412" font-size="20" font-weight="600">both</text>
      <rect x="18" y="62" width="40" height="40" fill="#141412"/>
      <rect x="74" y="62" width="40" height="40" fill="#9f3f2d"/>
      <path d="M66 58v54" stroke="#d5cfc2" stroke-width="2"/>
    </g>
    <g transform="translate(538 72)">
      <rect width="132" height="150" fill="#f4f1ea" stroke="#141412" stroke-width="2"/>
      <text x="18" y="34" fill="#141412" font-size="20" font-weight="600">pack</text>
      <rect x="18" y="60" width="96" height="16" fill="#141412"/>
      <rect x="18" y="84" width="96" height="16" fill="#30302d"/>
      <rect x="18" y="108" width="68" height="16" fill="#9f3f2d"/>
      <text x="18" y="138" fill="#77736a" font-size="11">notes.md</text>
    </g>
  </g>
</svg>
